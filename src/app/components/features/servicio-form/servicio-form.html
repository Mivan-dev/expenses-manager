<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 text-white">
  <div class="bg-slate-900 rounded-2xl p-8 w-full max-w-md">
    <h4 class="pb-6 font-bold text-xl">Servicio</h4>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" action="" class="flex flex-col gap-4">
      <input type="text" formControlName="nombre" placeholder="Luz" class="modalForm" />
      <input type="text" formControlName="empresa" placeholder="EPEC" class="modalForm" />
      <input type="text" formControlName="monto" placeholder="$28.000" class="modalForm" />
      <input type="date" formControlName="vencimiento" placeholder="19/03/2026" class="modalForm" />
      <button type="submit" class="bg-teal-600 py-1.5 rounded-lg cursor-pointer hover:bg-teal-500">
        Agregar
      </button>
      <button
        (click)="gastosService.cerrarModal()"
        class="bg-gray-500 py-1.5 rounded-lg cursor-pointer hover:bg-slate-400"
      >
        Cancelar
      </button>
    </form>
  </div>
</div>
