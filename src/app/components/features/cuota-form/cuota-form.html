<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-slate-100 rounded-2xl shadow-xl p-8 w-full max-w-md">
    <h4 class="pb-6 font-bold text-xl">Agregar Cuotas</h4>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" action="" class="flex flex-col gap-4">
      <input type="text" formControlName="nombre" placeholder="Nombre: Celular" class="modalForm" />
      <input type="text" formControlName="cuotaActual" placeholder="Cuota actual: 1" class="modalForm"/>
      <input type="text" formControlName="cuotaTotal" placeholder="Cuota total: 6" class="modalForm"/>
      <input type="text" formControlName="monto" placeholder="Monto: $70.000" class="modalForm"/>
      <button type="submit" class="bg-emerald-700 text-white py-1.5 rounded-lg">Cargar Cuota</button>
      <button (click)="gastosService.cerrarModal()" class="border border-gray-300 bg-gray-100 py-1.5 rounded-lg">Cancelar</button>
    </form>
  </div>
</div>
